<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nakul ❤️ Sneha</title>
    <style>
        /* Import a romantic font */
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            font-family: 'Poppins', sans-serif;
            overflow: hidden; /* Prevents scrollbars from falling hearts */
            position: relative;
        }

        .container {
            text-align: center;
            z-index: 10; /* Keeps text above the falling hearts */
            background: rgba(255, 255, 255, 0.85);
            padding: 40px 60px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(5px);
            animation: fadeIn 2s ease-in-out;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 4rem;
            color: #d63384;
            margin: 0;
            line-height: 1.2;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .heart-container {
            margin: 30px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        .heart {
            font-size: 5rem;
            color: #ff3366;
            animation: pulse 1.2s infinite;
        }

        .names {
            font-size: 2.5rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #666;
            margin-top: 10px;
        }

        /* Animations */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Falling Hearts Background */
        .falling-heart {
            position: absolute;
            top: -10%;
            color: #ff6b81;
            font-size: 20px;
            opacity: 0.8;
            animation: fall linear forwards;
            z-index: 1;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="names">Nakul <span style="color:#ff3366">❤️</span> Sneha</div>
        <div class="heart-container">
            <div class="heart">❤️</div>
        </div>
        <h1>Happy Valentine's Day</h1>
        <p class="subtitle">Forever and Always</p>
    </div>

    <script>
        // JavaScript to create falling hearts
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('falling-heart');
            heart.innerHTML = '❤️';
            
            // Randomize position and animation properties
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's'; // Between 2s and 5s
            heart.style.fontSize = Math.random() * 20 + 10 + 'px'; // Random size
            
            document.body.appendChild(heart);

            // Remove heart after animation finishes to prevent memory leaks
            setTimeout(() => {
                heart.remove();
            }, 5000);
        }

        // Create a new heart every 300ms
        setInterval(createHeart, 300);
    </script>

</body>
</html>
